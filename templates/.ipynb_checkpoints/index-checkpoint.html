cat > templates/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <title>Bearing Fault Detection</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 { 
            color: #333; 
            text-align: center;
            margin-bottom: 30px;
        }
        .stats { 
            display: flex; 
            gap: 20px; 
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center;
            flex: 1;
            min-width: 150px;
        }
        .stat strong { 
            font-size: 0.9em;
            display: block;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
        }
        #plot { 
            width: 100%; 
            height: 500px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Bearing Fault Prediction Dashboard</h1>
        
        <div class="stats">
            <div class="stat">
                <strong>Normal Stage Score</strong>
                <div class="stat-value">{{ stats.normal }}</div>
            </div>
            <div class="stat">
                <strong>Early Fault Score</strong>
                <div class="stat-value">{{ stats.early }}</div>
            </div>
            <div class="stat">
                <strong>Late Fault Score</strong>
                <div class="stat-value">{{ stats.late }}</div>
            </div>
        </div>
        
        <div id="plot"></div>
    </div>
    
    <script>
        var plotData = {{ plot_json | safe }};
        Plotly.newPlot('plot', plotData.data, plotData.layout);
    </script>
</body>
</html>
EOF
